<!DOCTYPE html>
<html>
<head>
<title>Mottama Holding</title>

<style>

body{
margin:0;
font-family:Arial;
background:#1d2671;
background:linear-gradient(135deg,#1d2671,#c33764);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.brand{
font-size:44px;
font-weight:700;
margin-bottom:20px;
}

.message{
font-size:20px;
line-height:1.6;
margin-bottom:35px;
}

.countdown{
font-size:36px;
font-weight:bold;
}

</style>
</head>

<body>

<div>

<div class="brand">Mottama Holdings</div>

<div class="message">
🌊 Thingyan season has arrived!<br><br>
While Myanmar celebrates the New Year with water,
our digital headquarters is refreshing its systems.<br><br>
We'll return soon with renewed energy
and improved performance.
</div>

<div id="countdown" class="countdown"></div>

</div>

<script>
// Target: 2026-04-16 18:00:00 Myanmar Time (UTC+6:30)
// This equals 2026-04-16 11:30:00 UTC
var countDownDate = Date.UTC(2026, 4, 16, 15, 00, 0); // months are 0‑based: 3 = April

var x = setInterval(function() {
  var now = new Date().getTime(); // current time in milliseconds since epoch (UTC)
  var distance = countDownDate - now;

  // Time calculations
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  // Display result
  document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s ";

  // If countdown is finished
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("countdown").innerHTML = "We're Back!";
  }
}, 1000);
</script>

</body>
</html>
